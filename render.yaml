services:

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: refineai-backend
    env: python
    plan: free
    rootDir: backend
    pythonVersion: "3.13.4"
    buildCommand: pip install -r requirements.txt && python -c "from fastembed import TextEmbedding; TextEmbedding('BAAI/bge-small-en-v1.5')"
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   

  # ── Frontend ─────────────────────────────────────────────
  - type: web
    name: refineai-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && node node_modules/vite/bin/vite.js build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   
